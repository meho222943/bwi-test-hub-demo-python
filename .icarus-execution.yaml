# Python + unittest demo for the BWI Test Hub — CONTAINER execution.
# Declares a runtime PROFILE (never a raw image): the hub maps the
# profile to an approved image in its runner-image catalog. No
# environment.inherit — the container image provides PATH/HOME itself
# (inheriting the host PATH would override the image's PATH).
version: 1
name: python-unittest-demo
command:
  argv: ["python3", "run.py"]
runtime:
  profile: python-3
  required: true
timeout:
  durationSeconds: 300
reportArtifacts:
  - kind: html-report
    path: report
    description: unittest HTML report
  - kind: junit-xml
    path: report/junit.xml
    description: JUnit results
